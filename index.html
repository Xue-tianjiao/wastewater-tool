/* =========================================================================
   AI 调用入口 —— 走自己的 /api/chat 代理（火山方舟 OpenAI 兼容）
   key 从 localStorage 读取，随请求头透传，不写死在代码里
   ========================================================================= */
async function callAI({ system, user }) {
  const cfg = getConfig();
  if (!cfg.apiKey) throw new Error("尚未配置 API Key，请点右上角「设置」填入。");
  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-ark-key": cfg.apiKey },
    body: JSON.stringify({
      model: cfg.model,
      messages: [{ role: "user", content: `${system}\n\n${user}` }],
      temperature: 0.2,
      max_tokens: 4096,
    }),
  });
  let data;
  try { data = await res.json(); } catch (e) { throw new Error(`接口返回异常（${res.status}）`); }
  if (!res.ok) throw new Error(data?.error?.message || data?.message || `接口错误 ${res.status}`);
  const text = data?.choices?.[0]?.message?.content || "";
  if (!text) throw new Error("模型返回为空，请检查模型 ID 是否正确");
  return text;
}

  let t = text.replace(/```json/gi, "").replace(/```/g, "").trim();
  const s = t.indexOf("{");
  if (s === -1) throw new Error("未找到 JSON");
  let depth = 0, end = -1;
  for (let i = s; i < t.length; i++) {
    if (t[i] === "{") depth++;
    else if (t[i] === "}") { depth--; if (depth === 0) { end = i; break; } }
  }
  let body = end !== -1 ? t.slice(s, end + 1) : t.slice(s);
  body = body.replace(/,\s*([}\]])/g, "$1");
  return JSON.parse(body);
}

async function callAIJSON(promptObj, { retries = 1 } = {}) {
  let lastRaw = "";
  for (let i = 0; i <= retries; i++) {
    const user = i === 0 ? promptObj.user
      : promptObj.user + `\n\n注意：上次输出无法解析为 JSON。请只输出一个严格合法的 JSON 对象，不要任何其他文字，也不要代码块标记。`;
    lastRaw = await callAI({ system: promptObj.system, user });
    try { return { json: extractJSON(lastRaw), raw: lastRaw }; } catch (e) {}
  }
  const err = new Error("AI 返回无法解析为 JSON");
  err.raw = lastRaw;
  throw err;
}

async function fetchSolarData(area) {
  const system = `你是光伏系统数据助手，熟悉中国各地太阳能资源。`;
  const user = `请给出中国"${area}"用于光伏系统设计的两个参数：
1) 年平均日峰光照时长（峰值日照小时数 PSH，单位 h/天，中国常见范围约 2.5~6）
2) 倾斜比水平辐射量（最佳倾角面相对水平面的年辐射增益比，通常约 1.0~1.3）
仅返回严格 JSON：{"peakSunHours":数字,"tiltRatio":数字,"dataSource":"来源或依据简述"}`;
  const raw = await callAI({ system, user });
  const j = extractJSON(raw);
  if (typeof j.peakSunHours !== "number" || typeof j.tiltRatio !== "number") throw new Error("光照数据格式异常");
  if (!j.dataSource) j.dataSource = "模型估算";
  return j;
}

function promptM3(kb, p, m1, m2) {

请严格按知识库依次计算：

(3) 发电模块：需发电量(kWh)=设备总功率×72÷0.9÷1000；从板库选一种型号，逐步增加板数量，直到 光伏日发电量(=峰值功率×板数×日峰光照×倾斜比×0.66) ≥ 需发电量 且 充满电池天数(=需储能电量÷光伏日发电量) < 1；电压尽量适配 51.2V 系统
(4) 光伏排列与场地：光伏板总长=单块板长×数量；总长≤氧化池平面长→1排，否则→2排；场地总长=MAX(氧化池平面长,光伏板总长)+0.4；场地总宽=氧化池平面宽+光伏板总宽+1.4

仅返回如下严格 JSON（不要解释、不要代码块）：
{"totalPowerW":数字,"reqStorageKWh":数字,"battCapacity":"如200Ah","battCount":数字,"actualStorageKWh":数字,"supplyHours":数字,"reqGenKWh":数字,"panelModel":"字符串","panelPeakW":数字,"panelCount":数字,"dailyGenKWh":数字,"fullChargeDays":数字,"arrangement":"1排或2排","panelTotalLength":数字,"panelTotalWidth":数字,"siteLength":数字,"siteWidth":数字,"calcNote":"一句话关键中间值"}`,

/* =========================================================================
   App
   ========================================================================= */
function App() {
  const [tab, setTab] = useState("generate");
  const [kb, setKb] = useState(loadKB);
  const [cfg, setCfg] = useState(getConfig);
  const [showSettings, setShowSettings] = useState(false);

  const [params, setParams] = useState({
    area: "云南省昆明市", Q: 50, codIn: 300, nhIn: 45, codOut: 50, nhOut: 5,
    peakSunHours: "", tiltRatio: "",
  });
  const [solarFetching, setSolarFetching] = useState(false);
  const [solarNote, setSolarNote] = useState("");
  const [steps, setSteps] = useState([]);
  const [generating, setGenerating] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState("");
  const [diag, setDiag] = useState(null);

  const persistKb = (next) => { setKb(next); saveKBls(next); };
  const persistCfg = (next) => { setCfg(next); saveConfigLs(next); };
  const setStep = (i, status) => setSteps((prev) => prev.map((s, idx) => (idx === i ? { ...s, status } : s)));

  const handleFetchSolar = async () => {
    setSolarFetching(true); setSolarNote("");
    try {
      const j = await fetchSolarData(params.area);
      setParams((p) => ({ ...p, peakSunHours: j.peakSunHours, tiltRatio: j.tiltRatio }));
      setSolarNote(`已获取 · ${j.dataSource}`);
    } catch (e) { setSolarNote("获取失败：" + e.message); }
    setSolarFetching(false);
  };

  const generate = async () => {
    if (!getConfig().apiKey) { setError("请先在右上角「设置」中填入 API Key。"); setShowSettings(true); return; }
    setError(""); setResult(null); setDiag(null); setGenerating(true);

    const needSolar = params.peakSunHours === "" || params.tiltRatio === "" || params.peakSunHours == null || params.tiltRatio == null;
    const list = [];
    if (needSolar) list.push({ label: "获取当地光照参数", status: "wait", net: true });
    list.push(
      { label: "格栅调节池计算", status: "wait" },
      { label: "生物氧化池计算", status: "wait" },
      { label: "电力系统计算", status: "wait" },
      { label: "整合设计文档", status: "wait" },
    );
    setSteps(list);

    let idx = 0;
    try {
      let solar = { peakSunHours: params.peakSunHours, tiltRatio: params.tiltRatio, dataSource: "用户手动输入" };
      if (needSolar) {
        setStep(idx, "run");
        try {
          const j = await fetchSolarData(params.area);
          solar = { peakSunHours: j.peakSunHours, tiltRatio: j.tiltRatio, dataSource: j.dataSource };
          setParams((p) => ({ ...p, peakSunHours: j.peakSunHours, tiltRatio: j.tiltRatio }));
          setStep(idx, "done");
        } catch (e) {
          setStep(idx, "err");
          throw new Error("无法获取当地光照参数。请在上方手动填写「年平均日峰光照时长」和「倾斜比水平辐射量」后重试。");
        }
        idx++;
      }
      const p = { ...params, peakSunHours: solar.peakSunHours, tiltRatio: solar.tiltRatio };

      setStep(idx, "run");
      const { json: m1 } = await callAIJSON(promptM1(kb, p));
      setStep(idx, "done"); idx++;

      setStep(idx, "run");
      const { json: m2 } = await callAIJSON(promptM2(kb, p));
      setStep(idx, "done"); idx++;

      setStep(idx, "run");
      let m3;
      try { m3 = (await callAIJSON(promptM3(kb, p, m1, m2))).json; }
      catch (e) {
        setStep(idx, "err");
        setDiag({ step: "电力系统计算", raw: e.raw || "（无原始返回）" });
        throw new Error("电力系统计算返回格式异常，已记录 AI 原始返回供排查。可点「重新生成」重试。");
      }
      m3.peakSunHours = solar.peakSunHours; m3.tiltRatio = solar.tiltRatio; m3.dataSource = solar.dataSource;
      setStep(idx, "done"); idx++;

      setStep(idx, "run");
      setResult({ params: p, m1, m2, m3, at: new Date() });
      setStep(idx, "done");
    } catch (e) {
      setError(e.message || "生成失败，请重试");
      setSteps((prev) => prev.map((s) => (s.status === "run" ? { ...s, status: "err" } : s)));
      if (e.raw) setDiag((d) => d || { step: "计算", raw: e.raw });
    } finally { setGenerating(false); }
  };

  const exportWord = () => {
    if (!result) return;
    const html = buildWordHTML(result, kb);
    const blob = new Blob(["\ufeff", html], { type: "application/msword" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "污水处理系统设计方案.doc";
    a.rel = "noopener";
    a.style.display = "none";
    document.body.appendChild(a);              // 必须挂到 DOM，部分浏览器才会触发下载
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 5000); // 延迟回收，避免下载未开始就被取消
  };

  const openPrint = () => {
    if (!result) return;
    const html = buildWordHTML(result, kb);
    const w = window.open("", "_blank");
    if (!w) { alert("浏览器拦截了新窗口。请允许弹窗后重试，或直接点「导出 Word」下载。"); return; }
    w.document.open();
    w.document.write(html);
    w.document.close();
  };

  const configured = !!cfg.apiKey;

  return (
    <div className="min-h-screen text-slate-800">
      <div className="bg-gradient-to-r from-teal-700 to-cyan-700 text-white">
        <div className="max-w-5xl mx-auto px-6 py-5 flex items-center gap-3">
          <div className="w-11 h-11 rounded-xl bg-white/15 flex items-center justify-center"><Droplets s={24} /></div>
          <div className="flex-1">
            <h1 className="text-xl font-bold tracking-tight">污水处理系统设计方案生成器</h1>
            <p className="text-teal-100 text-sm">清研环境科技股份有限公司 · 改良生物接触氧化工艺</p>
          </div>
          <button onClick={() => setShowSettings(true)}
            className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm transition ${configured ? "bg-white/15 hover:bg-white/25" : "bg-amber-400 text-amber-950 hover:bg-amber-300"}`}>
            <Settings s={15} /> {configured ? "设置" : "请先配置"}
          </button>
        </div>
        <div className="max-w-5xl mx-auto px-6 flex gap-1">
          {[{ k: "generate", label: "方案生成", Icon: Play }, { k: "kb", label: "知识库管理", Icon: Database }].map(({ k, label, Icon }) => (
            <button key={k} onClick={() => setTab(k)}
              className={`flex items-center gap-2 px-4 py-2.5 text-sm font-medium rounded-t-lg transition ${tab === k ? "bg-slate-50 text-teal-700" : "text-teal-50 hover:bg-white/10"}`}>
              <Icon s={16} /> {label}
            </button>
          ))}
        </div>
      </div>

      <div className="max-w-5xl mx-auto px-6 py-6">
        {tab === "generate" ? (
          <GeneratePanel params={params} setParams={setParams} steps={steps} generating={generating}
            generate={generate} result={result} error={error} diag={diag} exportWord={exportWord} openPrint={openPrint} kb={kb}
            solarFetching={solarFetching} solarNote={solarNote} handleFetchSolar={handleFetchSolar} />
        ) : (
          <KbPanel kb={kb} persistKb={persistKb} />
        )}
      </div>

      <div className="max-w-5xl mx-auto px-6 pb-8 text-xs text-slate-400 flex items-center gap-2">
        <Cpu s={13} /> 模型：{cfg.model || "未设置"} · 经 /api/chat 代理调用火山方舟，API Key 仅存于本浏览器。
      </div>

      {showSettings && <SettingsModal cfg={cfg} onSave={persistCfg} onClose={() => setShowSettings(false)} />}
    </div>
  );
}

/* ---------------- 知识库管理 ---------------- */
function KbPanel({ kb, persistKb }) {
  const [open, setOpen] = useState(null);
  const [draft, setDraft] = useState("");
  const [savedKey, setSavedKey] = useState("");
  const fileRef = useRef();
  const openSection = (key) => { setOpen(key); setDraft(kb[key]); setSavedKey(""); };
  const save = (key) => { persistKb({ ...kb, [key]: draft }); setSavedKey(key); setTimeout(() => setSavedKey(""), 1800); };
  const onUpload = (key, file) => { const r = new FileReader(); r.onload = () => setDraft(String(r.result)); r.readAsText(file, "utf-8"); };
  return (
    <div className="space-y-3">
      <div className="bg-teal-50 border border-teal-100 rounded-xl p-4 text-sm text-teal-800 flex items-start gap-2">
        <Database s={16} cls="mt-0.5 shrink-0" /><span>知识库内容会实时注入 AI 计算 prompt，修改后自动保存在本浏览器并在下次生成时生效。可直接编辑文本，或上传 .txt 文件覆盖。</span>
      </div>
      {KB_SECTIONS.map(({ key, label, Icon, desc }) => (
        <div key={key} className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
          <button onClick={() => (open === key ? setOpen(null) : openSection(key))} className="w-full flex items-center gap-3 px-5 py-4 hover:bg-slate-50 transition text-left">
            <div className="w-9 h-9 rounded-lg bg-teal-50 text-teal-600 flex items-center justify-center shrink-0"><Icon s={18} /></div>
            <div className="flex-1"><div className="font-medium text-slate-700">{label}</div><div className="text-xs text-slate-400">{desc}</div></div>
            <Chevron s={18} cls={`text-slate-400 transition ${open === key ? "rotate-180" : ""}`} />
          </button>
          {open === key && (
            <div className="px-5 pb-5 border-t border-slate-100">
              <textarea value={draft} onChange={(e) => setDraft(e.target.value)} spellCheck={false}
                className="w-full h-72 mt-4 p-3 text-xs font-mono leading-relaxed border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-400 resize-y" />
              <div className="flex flex-wrap items-center gap-2 mt-3">
                <button onClick={() => save(key)} className="px-4 py-1.5 bg-teal-600 hover:bg-teal-700 text-white text-sm rounded-lg flex items-center gap-1.5"><Save s={14} /> 保存</button>
                <button onClick={() => { fileRef.current.dataset.key = key; fileRef.current.click(); }} className="px-4 py-1.5 border border-slate-300 text-slate-600 text-sm rounded-lg flex items-center gap-1.5 hover:bg-slate-50"><Upload s={14} /> 上传 .txt 覆盖</button>
                <button onClick={() => setDraft(DEFAULT_KB[key])} className="px-4 py-1.5 border border-slate-300 text-slate-600 text-sm rounded-lg flex items-center gap-1.5 hover:bg-slate-50"><Reset s={14} /> 恢复默认</button>
                {savedKey === key && <span className="text-sm text-teal-600 flex items-center gap-1"><Check s={15} /> 已保存</span>}
              </div>
            </div>
          )}
        </div>
      ))}
      <input ref={fileRef} type="file" accept=".txt,.md" className="hidden"
        onChange={(e) => { const f = e.target.files?.[0]; if (f) onUpload(fileRef.current.dataset.key, f); e.target.value = ""; }} />
    </div>
  );
}

/* ---------------- 小组件 ---------------- */
const inputCls = "w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-400";
function Field({ label, hint, span2, children }) {
  return (<div className={span2 ? "col-span-2 md:col-span-1" : ""}>
    <label className="block text-xs font-medium text-slate-500 mb-1">{label} {hint && <span className="text-slate-400 font-normal">· {hint}</span>}</label>{children}
  </div>);
}
function NumField({ label, unit, value, onChange }) {
  return (<Field label={label}><div className="relative">
    <input type="number" className={inputCls + " pr-16"} value={value} onChange={(e) => onChange(e.target.value === "" ? "" : Number(e.target.value))} />
    <span className="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-slate-400">{unit}</span>
  </div></Field>);
}
function StepIcon({ status }) {
  if (status === "done") return <Check s={18} cls="text-teal-600 shrink-0" />;
  if (status === "run") return <Loader s={18} cls="text-teal-600 shrink-0" />;
  if (status === "err") return <Alert s={18} cls="text-red-500 shrink-0" />;
  return <Circ s={18} cls="text-slate-300 shrink-0" />;
}
function DocSection({ n, title, children }) {
  return (<div className="mb-6"><h2 className="text-base font-bold text-slate-800 border-l-4 border-teal-600 pl-3 mb-3">{n}、{title}</h2><div className="pl-3">{children}</div></div>);
}
function SubBlock({ Icon, title, note, children }) {
  return (<div className="mb-4 bg-slate-50 rounded-lg p-4">
    <div className="flex items-center gap-2 mb-2"><Icon s={16} cls="text-teal-600" /><h3 className="font-semibold text-slate-700 text-sm">{title}</h3></div>
    {children}{note && <div className="mt-2 text-xs text-slate-400 border-t border-slate-200 pt-2">计算摘要：{note}</div>}
  </div>);
}
function KV({ k, v }) {
  return (<div className="flex text-sm py-0.5"><span className="text-slate-500 shrink-0 w-36">{k}</span><span className="text-slate-800 font-medium">{v}</span></div>);
}
